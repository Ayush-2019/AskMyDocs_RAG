name: RAG Evaluation Gate

# Trigger on PRs that touch retrieval, generation, prompts, or eval logic
on:
  pull_request:
    paths:
      - 'src/**'
      - 'eval/**'
      - 'config.yaml'
      - 'requirements.txt'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: askmydocs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      ASKMYDOCS_DATABASE__HOST: localhost
      ASKMYDOCS_DATABASE__PORT: "5432"
      ASKMYDOCS_DATABASE__NAME: askmydocs
      ASKMYDOCS_DATABASE__USER: postgres
      ASKMYDOCS_DATABASE__PASSWORD: postgres
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up database
        run: python scripts/setup_db.py

      - name: Ingest test documents
        run: python scripts/ingest_docs.py --path docs/

      - name: Run evaluation suite
        run: python eval/run_eval.py --dataset eval/golden.json --output eval/results.json

      - name: Upload eval results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-${{ github.sha }}
          path: eval/results.json
          retention-days: 90

      - name: Check quality gates
        run: python eval/check_gates.py eval/results.json
